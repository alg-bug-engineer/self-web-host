name: Deploy to Aliyun ECS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USER }}
          key: ${{ secrets.ECS_SSH_KEY }}
          # 注意：请确保下方 cd 的路径与您 ECS 上的实际项目路径一致
          script: |
            cd /Users/zhangqilai/project/self-web-host
            
            # 1. 拉取代码
            git pull origin main
            
            # 2. 安装依赖
            npm install
            
            # 3. 清理构建缓存（防止 Contentlayer 索引失效导致的 404）
            rm -rf .next .contentlayer
            
            # 4. 执行构建
            npm run build
            
            # 5. 重启服务
            # 如果您使用了 ecosystem.config.js，也可以使用 pm2 reload ecosystem.config.js
            pm2 restart ai-knowledgepoints
